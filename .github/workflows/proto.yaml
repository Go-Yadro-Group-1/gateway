name: Proto-Check-Correctness

on:
  push:
    branches:
      - main
    paths:
      - "api/proto/**"
      - ".github/workflows/proto.yaml"
  pull_request:
    paths:
      - "api/proto/**"
      - ".github/workflows/proto.yaml"

jobs:
  buf-checks:
    name: buf-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: api/proto
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: lint
        run: buf lint

      - name: format
        run: buf format --diff --exit-code
